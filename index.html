<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DRIP PHONK</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap');

:root {
  --bg:    #07050c;
  --panel: #100d1a;
  --c1:    #cc44ff;
  --c2:    #00ffaa;
  --c3:    #ff6600;
  --gold:  #ffdd44;
  --red:   #ff2255;
  --text:  #ddd0ee;
  --dim:   #241b38;
}

html, body {
  margin: 0; padding: 0;
  width: 100vw; height: 100vh;
  overflow: hidden;
  background: var(--bg);
  font-family: 'Press Start 2P', monospace;
}

/* ── SCREENS ── */
.screen {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 18px;
  background: var(--bg);
  z-index: 10;
}
.screen.hidden { display: none; }

/* ── RECORD SCREEN ── */
#s-rec h1 {
  font-size: clamp(2rem, 8vw, 3rem);
  color: var(--c1);
  text-shadow: 4px 4px 0 #440066, 0 0 30px rgba(204,68,255,.6);
  text-align: center;
  line-height: 1.3;
  margin: 0;
}
#s-rec p {
  font-family: 'VT323', monospace;
  font-size: clamp(1rem, 4vw, 1.3rem);
  color: var(--text);
  opacity: .55;
  text-align: center;
  line-height: 1.8;
  max-width: 300px;
  margin: 0;
}

#waveform-wrap {
  width: min(300px, 90vw);
  height: 60px;
  background: var(--panel);
  border: 2px solid var(--dim);
  position: relative;
  overflow: hidden;
}
#waveform {
  width: 100%; height: 100%; display: block;
}
/* scanlines */
#waveform-wrap::after {
  content: '';
  position: absolute; inset: 0;
  background: repeating-linear-gradient(
    transparent 0px, transparent 2px,
    rgba(0,0,0,.28) 2px, rgba(0,0,0,.28) 4px
  );
  pointer-events: none;
}

#rec-timer {
  font-size: clamp(.8rem, 3vw, 1.1rem);
  color: var(--red);
  text-shadow: 0 0 10px var(--red);
  min-height: 1.5em;
  text-align: center;
}

/* Big record button */
#rec-btn {
  width: 80px; height: 80px;
  border-radius: 50%;
  border: 4px solid var(--red);
  background: var(--panel);
  box-shadow: 0 0 20px rgba(255,34,85,.4), 0 4px 0 #000;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  /* Critical for mobile tap: */
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  transition: transform .1s, box-shadow .1s;
}
#rec-btn:active {
  transform: scale(.92);
  box-shadow: 0 0 30px rgba(255,34,85,.8), 0 0 0 #000;
}
#rec-dot {
  width: 30px; height: 30px;
  border-radius: 50%;
  background: var(--red);
  box-shadow: 0 0 12px var(--red);
  transition: border-radius .2s, background .2s;
}
#rec-btn.recording #rec-dot {
  border-radius: 4px;
  width: 24px; height: 24px;
  animation: blink .7s steps(1) infinite;
}

#rec-status {
  font-family: 'VT323', monospace;
  font-size: clamp(1rem, 4vw, 1.2rem);
  letter-spacing: .2em;
  color: var(--text);
  opacity: .5;
  text-align: center;
  min-height: 1.5em;
}

/* Launch button — hidden until sample ready */
#launch-btn {
  display: none;
  padding: 14px 24px;
  background: var(--c1);
  color: #000;
  border: none;
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(.5rem, 2.5vw, .7rem);
  letter-spacing: .05em;
  cursor: pointer;
  box-shadow: 0 5px 0 #440066, 0 0 20px rgba(204,68,255,.4);
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  transition: transform .1s, box-shadow .1s;
}
#launch-btn:active {
  transform: translateY(4px);
  box-shadow: 0 1px 0 #440066;
}

#rerec-btn {
  display: none;
  background: none;
  border: none;
  font-family: 'VT323', monospace;
  font-size: 1.1rem;
  letter-spacing: .15em;
  color: var(--text);
  opacity: .3;
  cursor: pointer;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}

/* ── MAIN SCREEN ── */
#s-main {
  background: transparent;
  pointer-events: none; /* children opt in */
}

/* pixel canvas underneath */
#c {
  position: fixed;
  inset: 0;
  touch-action: none;
  cursor: crosshair;
  pointer-events: all;
}

/* top bar */
#topbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 20;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 10px;
  background: var(--panel);
  border-bottom: 2px solid var(--dim);
  box-shadow: 0 2px 0 #000;
  pointer-events: all;
}
#logo {
  font-size: clamp(.45rem,.8vw,.6rem);
  color: var(--c1);
  text-shadow: 2px 2px 0 #440066;
  line-height: 1.4;
}
#logo small {
  display: block;
  font-size: .75em;
  color: var(--c2);
  text-shadow: 1px 1px 0 #004433;
}

#steps {
  display: flex;
  gap: 3px;
  align-items: center;
}
.sq {
  width: 5px; height: 5px;
  background: var(--dim);
}
.sq.beat { width: 7px; height: 7px; }
.sq.on   { background: var(--c1); box-shadow: 0 0 5px var(--c1); }

#bpm-ctl {
  display: flex; align-items: center; gap: 4px;
}
.bbtn {
  width: 24px; height: 24px;
  background: var(--dim);
  border: none;
  color: var(--gold);
  font-family: 'Press Start 2P', monospace;
  font-size: .55rem;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  box-shadow: 0 2px 0 #000;
}
.bbtn:active { transform: translateY(2px); box-shadow: none; }
#bpm-disp {
  font-size: .55rem;
  color: var(--gold);
  text-shadow: 1px 1px 0 #443300;
  min-width: 48px;
  text-align: center;
  background: var(--panel);
  padding: 3px 4px;
  border: 1px solid var(--dim);
}

/* nozzle row */
#nozzles {
  position: fixed;
  top: 48px; left: 0; right: 0;
  z-index: 20;
  display: flex;
  justify-content: space-around;
  padding: 6px 8px;
  pointer-events: all;
}
.pod { display: flex; flex-direction: column; align-items: center; gap: 3px; }
.pod-lbl {
  font-size: .35rem;
  letter-spacing: .1em;
  text-align: center;
  line-height: 1.5;
}
.nbtn {
  width: 86px; height: 36px;
  border: none;
  font-family: 'Press Start 2P', monospace;
  font-size: .38rem;
  letter-spacing: .04em;
  cursor: pointer;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  transition: transform .07s, box-shadow .07s;
}
.nbtn:active { transform: translateY(3px); }
.nbtn.p1 {
  background: #1a003a; color: var(--c1);
  box-shadow: 0 4px 0 #220044, inset 0 0 0 2px #440088;
}
.nbtn.p2 {
  background: #001f18; color: var(--c2);
  box-shadow: 0 4px 0 #003322, inset 0 0 0 2px #006644;
}
.nbtn.p3 {
  background: #200800; color: var(--c3);
  box-shadow: 0 4px 0 #331100, inset 0 0 0 2px #882200;
}
.charge {
  width: 86px; height: 5px;
  background: var(--dim);
}
.charge-fill { height: 100%; width: 0%; transition: width .08s linear; }

/* toast */
#toast {
  position: fixed;
  bottom: 40px; left: 50%;
  transform: translateX(-50%);
  background: var(--panel);
  border: 2px solid var(--dim);
  padding: 6px 14px;
  font-size: .44rem;
  letter-spacing: .05em;
  color: var(--text);
  opacity: 0;
  pointer-events: none;
  z-index: 50;
  white-space: nowrap;
  box-shadow: 0 3px 0 #000;
  transition: opacity .15s;
}

#newrec {
  position: fixed;
  bottom: 10px; left: 50%;
  transform: translateX(-50%);
  z-index: 30;
  background: var(--panel);
  border: 1px solid var(--dim);
  padding: 5px 14px;
  font-family: 'VT323', monospace;
  font-size: .9rem;
  letter-spacing: .12em;
  color: var(--text);
  opacity: .28;
  cursor: pointer;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  pointer-events: all;
}
#newrec:active { opacity: .8; }

/* CRT overlay */
#crt {
  position: fixed; inset: 0;
  z-index: 90;
  pointer-events: none;
  background: repeating-linear-gradient(
    transparent 0, transparent 2px,
    rgba(0,0,0,.14) 2px, rgba(0,0,0,.14) 4px
  );
}

@keyframes blink {
  0%, 49% { opacity: 1; }
  50%, 100% { opacity: .2; }
}
</style>
</head>
<body>

<!-- CRT overlay -->
<div id="crt"></div>

<!-- ══ RECORD SCREEN ══ -->
<div id="s-rec" class="screen">
  <h1>DRIP<br>PHONK</h1>
  <p>record your voice or a beat.<br>touch a swelling drop to release it.</p>
  <div id="waveform-wrap">
    <canvas id="waveform" width="300" height="60"></canvas>
  </div>
  <div id="rec-timer">&nbsp;</div>
  <button id="rec-btn"><div id="rec-dot"></div></button>
  <div id="rec-status">TAP TO RECORD</div>
  <button id="launch-btn">[ DROP THE PHONK ]</button>
  <button id="rerec-btn">↺ record again</button>
</div>

<!-- ══ MAIN SCREEN ══ -->
<div id="s-main" class="screen hidden">
  <canvas id="c"></canvas>

  <div id="topbar">
    <div id="logo">DRIP PHONK<small>DUBSTEP BAILE</small></div>
    <div id="steps">
      <div class="sq beat" id="sq0"></div><div class="sq" id="sq1"></div>
      <div class="sq" id="sq2"></div><div class="sq" id="sq3"></div>
      <div class="sq beat" id="sq4"></div><div class="sq" id="sq5"></div>
      <div class="sq" id="sq6"></div><div class="sq" id="sq7"></div>
      <div class="sq beat" id="sq8"></div><div class="sq" id="sq9"></div>
      <div class="sq" id="sq10"></div><div class="sq" id="sq11"></div>
      <div class="sq beat" id="sq12"></div><div class="sq" id="sq13"></div>
      <div class="sq" id="sq14"></div><div class="sq" id="sq15"></div>
    </div>
    <div id="bpm-ctl">
      <button class="bbtn" id="bdn">-</button>
      <div id="bpm-disp">140</div>
      <button class="bbtn" id="bup">+</button>
    </div>
  </div>

  <div id="nozzles">
    <div class="pod">
      <div class="pod-lbl" style="color:var(--c1)">SAMPLE<br>LOOP</div>
      <button class="nbtn p1" id="n1">▼ FILL</button>
      <div class="charge"><div class="charge-fill" id="cf1" style="background:var(--c1)"></div></div>
    </div>
    <div class="pod">
      <div class="pod-lbl" style="color:var(--c2)">BAILE<br>BEAT</div>
      <button class="nbtn p2" id="n2">▼ FILL</button>
      <div class="charge"><div class="charge-fill" id="cf2" style="background:var(--c2)"></div></div>
    </div>
    <div class="pod">
      <div class="pod-lbl" style="color:var(--c3)">DUB<br>BASS</div>
      <button class="nbtn p3" id="n3">▼ FILL</button>
      <div class="charge"><div class="charge-fill" id="cf3" style="background:var(--c3)"></div></div>
    </div>
  </div>

  <div id="toast"></div>
  <button id="newrec">⏺ new recording</button>
</div>

<script>
'use strict';

// ── Simple tap helper — works on all platforms ──
function tap(el, fn) {
  if (!el) return;
  // touchend for instant mobile response
  el.addEventListener('touchend', function(e) {
    e.preventDefault();
    fn();
  }, { passive: false });
  // click for desktop / as fallback
  el.addEventListener('click', fn);
}

// ── Screens ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

// ══════════════════════════════════════════
//  AUDIO CONTEXT
// ══════════════════════════════════════════
let AC = null, masterBus = null;

function initAC() {
  if (AC) return;
  AC = new (window.AudioContext || window.webkitAudioContext)();
  masterBus = AC.createDynamicsCompressor();
  masterBus.threshold.value = -8;
  masterBus.knee.value = 10;
  masterBus.ratio.value = 4;
  masterBus.attack.value = 0.003;
  masterBus.release.value = 0.18;
  masterBus.connect(AC.destination);
  if (AC.state === 'suspended') AC.resume();
}

function dest() { return masterBus || AC.destination; }

function shot(buf, vol, rate) {
  if (!AC || !buf) return;
  var g = AC.createGain();
  g.gain.value = vol || 0.85;
  g.connect(dest());
  var s = AC.createBufferSource();
  s.buffer = buf;
  s.playbackRate.value = rate || 1;
  s.connect(g);
  s.start();
  s.onended = function() { try { g.disconnect(); s.disconnect(); } catch(e){} };
}

// ══════════════════════════════════════════
//  BPM & CLOCK
// ══════════════════════════════════════════
var BPM = 140;
var STEPS = 16;
function s16() { return 60 / BPM / 4; }
function barLen() { return s16() * STEPS; }

var clockStep = 0, nextStepT = 0, clockOn = false;
function startClock() {
  if (clockOn) return;
  clockOn = true;
  nextStepT = AC.currentTime + 0.05;
  clockStep = 0;
  tickClock();
}
function tickClock() {
  while (nextStepT < AC.currentTime + 0.18) {
    var s = clockStep, when = nextStepT;
    var delay = Math.max(0, (when - AC.currentTime) * 1000 - 10);
    (function(st) {
      setTimeout(function() {
        document.querySelectorAll('.sq').forEach(function(d, i) {
          d.classList.toggle('on', i === st);
        });
      }, delay);
    })(s);
    clockStep = (clockStep + 1) % STEPS;
    nextStepT += s16();
  }
  setTimeout(tickClock, 28);
}

function updBPM() {
  document.getElementById('bpm-disp').textContent = BPM;
  if (clockOn && DRUMS) {
    buildBeatBuffers();
    balloons.forEach(function(b) { if (b.state === 'swelling') b.startAudio(); });
  }
}

// ══════════════════════════════════════════
//  DSP UTILS
// ══════════════════════════════════════════
function mkBuf(dur, fn) {
  var sr = AC.sampleRate, n = Math.floor(sr * dur);
  var buf = AC.createBuffer(1, n, sr);
  fn(buf.getChannelData(0), sr, n);
  return buf;
}
function norm(d, ceil) {
  ceil = ceil || 0.9;
  var pk = 0;
  for (var i = 0; i < d.length; i++) pk = Math.max(pk, Math.abs(d[i]));
  if (pk > 0.001) { var g = ceil / pk; for (var i = 0; i < d.length; i++) d[i] *= g; }
}
function satCurve(k) {
  k = k || 200;
  var n = 512, c = new Float32Array(n);
  for (var i = 0; i < n; i++) { var x = i*2/n-1; c[i] = (Math.PI+k)*x/(Math.PI+k*Math.abs(x)); }
  return c;
}
function hardCurve(drive) {
  drive = drive || 3;
  var n = 512, c = new Float32Array(n);
  for (var i = 0; i < n; i++) { var x = (i*2/n-1)*drive; c[i] = Math.max(-1, Math.min(1, x)); }
  return c;
}
function applyWS(d, curve) {
  var n = curve.length;
  for (var i = 0; i < d.length; i++) {
    var idx = Math.floor((d[i]*.5+.5)*(n-1));
    d[i] = curve[Math.max(0, Math.min(n-1, idx))];
  }
}

// ══════════════════════════════════════════
//  DRUM SYNTHESIS
// ══════════════════════════════════════════
var DRUMS = null;

function buildDrums() {
  function subKick(f0, drive, dur) {
    f0 = f0||44; drive = drive||2.8; dur = dur||1.3;
    return mkBuf(dur, function(d, sr) {
      var sc = satCurve(100*drive), ph = 0;
      for (var i = 0; i < d.length; i++) {
        var t = i/sr, f = f0*(1+8*Math.exp(-t*10));
        ph += 2*Math.PI*f/sr;
        d[i] = Math.exp(-t*2.6)*Math.sin(ph)
             + Math.exp(-t*4)*0.4*Math.sin(ph*.5)
             + Math.exp(-t*90)*(Math.random()*2-1)*0.35;
      }
      applyWS(d, sc); norm(d, 0.9);
    });
  }
  function dubSnare() {
    return mkBuf(0.4, function(d, sr) {
      var sc = satCurve(240), hc = hardCurve(2);
      for (var i = 0; i < d.length; i++) {
        var t = i/sr;
        d[i] = (Math.random()*2-1)*Math.exp(-t*11)*0.55
             + Math.sin(2*Math.PI*175*t)*Math.exp(-t*22)*0.45
             + (Math.random()*2-1)*Math.exp(-t*90)*0.85
             + (Math.random()*2-1)*Math.exp(-t*5)*0.2;
      }
      applyWS(d, sc); applyWS(d, hc); norm(d, 0.88);
    });
  }
  function metalHat(open) {
    return mkBuf(open?0.35:0.055, function(d, sr) {
      var hc = hardCurve(1.8);
      var fs = [5900,7100,8700,4900,9600,3800];
      for (var i = 0; i < d.length; i++) {
        var t = i/sr, env = open ? Math.exp(-t*8) : Math.exp(-t*90);
        var v = 0; for (var j=0;j<fs.length;j++) v += Math.sin(2*Math.PI*fs[j]*t);
        d[i] = v/fs.length*env;
      }
      applyWS(d, hc); norm(d, 0.44);
    });
  }
  function reese(dur) {
    return mkBuf(dur||0.3, function(d, sr) {
      var sc = satCurve(200);
      for (var i = 0; i < d.length; i++) {
        var t = i/sr, env = 0.8*Math.exp(-t*2.5)+0.2;
        var v = 0;
        for (var h = 1; h <= 7; h++) {
          v += Math.sin(2*Math.PI*55*h*t)/h*0.7;
          v += Math.sin(2*Math.PI*55.7*h*t)/h*0.45;
        }
        d[i] = v * env * (0.5+0.5*Math.sin(2*Math.PI*(BPM/60*2)*t)) * 0.14;
      }
      applyWS(d, sc); norm(d, 0.88);
    });
  }
  function crunch() {
    return mkBuf(0.18, function(d, sr) {
      var hc = hardCurve(4.5), step = 2/64;
      for (var i = 0; i < d.length; i++) {
        var t = i/sr, env = Math.exp(-t*13);
        var v = (Math.random()*2-1)*env;
        v = Math.round(v/step)*step;
        v += Math.sin(2*Math.PI*400*t)*env*0.4;
        d[i] = v;
      }
      applyWS(d, hc); norm(d, 0.7);
    });
  }
  function surdo() {
    return mkBuf(1.0, function(d, sr) {
      var sc = satCurve(85), ph = 0;
      for (var i = 0; i < d.length; i++) {
        var t = i/sr, f = 64+72*Math.exp(-t*4.2);
        ph += 2*Math.PI*f/sr;
        d[i] = Math.exp(-t*2.6)*Math.sin(ph)+Math.exp(-t*4)*0.28*Math.sin(ph*.5)
             + Math.exp(-t*38)*(Math.random()*2-1)*0.15;
      }
      applyWS(d, sc); norm(d, 0.85);
    });
  }
  function conga(pitch) {
    pitch = pitch||190;
    return mkBuf(0.32, function(d, sr) {
      var sc = satCurve(120);
      for (var i = 0; i < d.length; i++) {
        var t = i/sr, f = pitch*Math.exp(-t*3.2);
        d[i] = Math.exp(-t*10)*(Math.sin(2*Math.PI*f*t)+0.25*Math.sin(2*Math.PI*f*2.2*t))
             + Math.exp(-t*48)*(Math.random()*2-1)*0.38;
      }
      applyWS(d, sc); norm(d, 0.76);
    });
  }
  function tamborim() {
    return mkBuf(0.12, function(d, sr) {
      var hc = hardCurve(2.2);
      for (var i = 0; i < d.length; i++) {
        var t = i/sr;
        d[i] = Math.exp(-t*46)*(Math.random()*2-1)
             + Math.exp(-t*30)*0.38*Math.sin(2*Math.PI*2200*t);
      }
      applyWS(d, hc);
    });
  }

  DRUMS = {
    kick:    subKick(44, 2.8, 1.3),
    kick2:   subKick(38, 3.2, 1.5),
    kickMid: subKick(62, 1.8, 0.8),
    snare:   dubSnare(),
    snare2:  dubSnare(),
    hatC:    metalHat(false),
    hatO:    metalHat(true),
    reese:   reese(0.3),
    reeseS:  reese(0.15),
    crunch:  crunch(),
    surdo:   surdo(),
    conga:   conga(190),
    congaL:  conga(145),
    tamb:    tamborim()
  };

  buildBeatBuffers();
}

// ══════════════════════════════════════════
//  BEAT BUFFERS — pre-baked loops
// ══════════════════════════════════════════
var BEAT = {};

function bakeBar(pattern) {
  var sr = AC.sampleRate;
  var barN = Math.floor(barLen() * sr);
  var buf = AC.createBuffer(1, barN, sr);
  var out = buf.getChannelData(0);
  for (var i = 0; i < pattern.length; i++) {
    var hit = pattern[i];
    var src = DRUMS[hit.d];
    if (!src) continue;
    var data = src.getChannelData(0);
    var off = Math.floor(hit.step * s16() * sr);
    var vol = hit.v || 0.85;
    for (var j = 0; j < data.length; j++) {
      if (off+j < barN) out[off+j] += data[j]*vol;
    }
  }
  norm(out, 0.88);
  return buf;
}

function buildBeatBuffers() {
  BEAT.baile = bakeBar([
    {d:'surdo', step:0, v:1.0}, {d:'tamb', step:1, v:.65},
    {d:'conga', step:2, v:.7},  {d:'tamb', step:3, v:.55},
    {d:'conga', step:4, v:.78}, {d:'surdo',step:5, v:.6},
    {d:'tamb',  step:6, v:.6},  {d:'congaL',step:7,v:.72},
    {d:'surdo', step:8, v:.92}, {d:'tamb', step:9, v:.62},
    {d:'conga', step:10,v:.65}, {d:'tamb', step:11,v:.55},
    {d:'conga', step:12,v:.78}, {d:'tamb', step:13,v:.58},
    {d:'surdo', step:14,v:.7},  {d:'conga',step:15,v:.65}
  ]);
  BEAT.dub = bakeBar([
    {d:'kick',  step:0, v:1.0}, {d:'hatC', step:1, v:.55},
    {d:'hatC',  step:2, v:.48}, {d:'hatC', step:3, v:.42},
    {d:'snare', step:4, v:.9},  {d:'hatC', step:5, v:.5},
    {d:'reese', step:6, v:.72}, {d:'hatC', step:7, v:.48},
    {d:'kick',  step:8, v:.88}, {d:'crunch',step:9,v:.65},
    {d:'kick2', step:10,v:.7},  {d:'hatC', step:11,v:.5},
    {d:'snare2',step:12,v:.92}, {d:'hatC', step:13,v:.5},
    {d:'hatO',  step:14,v:.6},  {d:'reeseS',step:15,v:.65}
  ]);
}

// ══════════════════════════════════════════
//  DROP FX
// ══════════════════════════════════════════
var FX = [
  {n:'PITCH UP',    c:'#cc44ff', fn:function(s){s.playbackRate.value=1.5;}},
  {n:'PITCH DOWN',  c:'#00ddaa', fn:function(s){s.playbackRate.value=0.6;}},
  {n:'HALF TIME',   c:'#8866ff', fn:function(s){s.playbackRate.value=0.5;}},
  {n:'DOUBLE',      c:'#ffdd44', fn:function(s){s.playbackRate.value=2.0;}},
  {n:'REVERSE',     c:'#ff4400', fn:function(s,buf){
    var b=buf, rev=AC.createBuffer(b.numberOfChannels,b.length,b.sampleRate);
    for(var c=0;c<b.numberOfChannels;c++){
      var a=b.getChannelData(c),d=rev.getChannelData(c);
      for(var i=0;i<a.length;i++) d[i]=a[a.length-1-i];
    }
    s.buffer=rev;
  }},
  {n:'8TH DELAY',   c:'#ffe066', wet:true, fn:function(s,buf,g){
    var dl=AC.createDelay(2); dl.delayTime.value=s16()*2;
    var fb=AC.createGain(); fb.gain.value=0.38;
    var w=AC.createGain(); w.gain.value=0.55;
    g.connect(dl); dl.connect(fb); fb.connect(dl); dl.connect(w); w.connect(dest());
  }},
  {n:'4TH DELAY',   c:'#ffaa00', wet:true, fn:function(s,buf,g){
    var dl=AC.createDelay(2); dl.delayTime.value=s16()*4;
    var fb=AC.createGain(); fb.gain.value=0.34;
    var w=AC.createGain(); w.gain.value=0.5;
    g.connect(dl); dl.connect(fb); fb.connect(dl); dl.connect(w); w.connect(dest());
  }},
  {n:'DISTORT',     c:'#ff2244', wet:true, fn:function(s,buf,g){
    var w=AC.createWaveShaper(); w.curve=satCurve(260);
    var gn=AC.createGain(); gn.gain.value=0.44;
    g.connect(w); w.connect(gn); gn.connect(dest());
  }},
  {n:'BIT CRUSH',   c:'#ff6600', wet:true, fn:function(s,buf,g){
    var w=AC.createWaveShaper(); w.curve=hardCurve(2.8);
    var gn=AC.createGain(); gn.gain.value=0.5;
    g.connect(w); w.connect(gn); gn.connect(dest());
  }},
  {n:'STUTTER',     c:'#aa00ff', wet:true, fn:function(s,buf,g){
    var lfo=AC.createOscillator(); lfo.frequency.value=1/s16();
    var lg=AC.createGain(); lg.gain.value=0.5;
    var tg=AC.createGain(); tg.gain.value=0.5;
    lfo.connect(lg); lg.connect(tg.gain);
    g.connect(tg); tg.connect(dest()); lfo.start();
    s.onended=function(){try{lfo.stop();}catch(e){}};
  }},
  {n:'TAPE SAT',    c:'#88ff44', wet:true, fn:function(s,buf,g){
    var w=AC.createWaveShaper(); w.curve=satCurve(70);
    var c=AC.createDynamicsCompressor();
    c.threshold.value=-12; c.knee.value=16; c.ratio.value=6;
    c.attack.value=0.002; c.release.value=0.12;
    g.connect(w); w.connect(c); c.connect(dest());
  }}
];

function randFX() { return FX[Math.floor(Math.random()*FX.length)]; }

// ══════════════════════════════════════════
//  PIXEL DRAW
// ══════════════════════════════════════════
var canvas = document.getElementById('c');
var ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;
var PX = 2; // pixel grid size
var W, H;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  ctx.imageSmoothingEnabled = false;
}
resize();
window.addEventListener('resize', resize);

function px(v) { return Math.round(v/PX)*PX; }

function rgba(hex, a) {
  var r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return 'rgba('+r+','+g+','+b+','+a+')';
}

// Chunky pixel circle
function pixCircle(cx, cy, r, fill, shine, shadow) {
  cx=px(cx); cy=px(cy);
  for (var dy=-r; dy<=r; dy+=PX) {
    for (var dx=-r; dx<=r; dx+=PX) {
      if (dx*dx+dy*dy > r*r) continue;
      var col = fill;
      if (dx < -r*.2 && dy < -r*.2) col = shine;
      else if (dx > r*.28 && dy > r*.28) col = shadow;
      ctx.fillStyle = col;
      ctx.fillRect(px(cx+dx)-PX/2, px(cy+dy)-PX/2, PX, PX);
    }
  }
}

// Chunky pixel teardrop (for falling state)
function pixDrop(cx, cy, r, fill, shine, shadow) {
  cx=px(cx); cy=px(cy);
  for (var dy=-Math.ceil(r*1.5); dy<=Math.ceil(r); dy+=PX) {
    for (var dx=-Math.ceil(r); dx<=Math.ceil(r); dx+=PX) {
      var ny=dy/r, nx=dx/r;
      var rAtY = ny < 0 ? Math.sqrt(Math.max(0,1-(ny+1.45)*(ny+1.45)*.18)) : Math.sqrt(Math.max(0,1-(ny-1.05)*(ny-1.05)*.6));
      if (nx*nx > rAtY*rAtY*0.85) continue;
      var col = fill;
      if (dx < -r*.2 && dy < -r*.3) col = shine;
      else if (dx > r*.25 && dy > r*.2) col = shadow;
      ctx.fillStyle = col;
      ctx.fillRect(px(cx+dx)-PX/2, px(cy+dy)-PX/2, PX, PX);
    }
  }
}

// ══════════════════════════════════════════
//  BALLOON
// ══════════════════════════════════════════
var NOZZLE_Y = 112;
var LANES = [.22, .5, .78];
var COLS  = ['#cc44ff','#00ffaa','#ff6600'];
var SHINE = ['#ee99ff','#99ffdd','#ffaa44'];
var SHAD  = ['#660088','#006644','#882200'];
var ROLES = ['sample','baile','dub'];
var BALLOONS_MAX = 4;

var balloons = [];

function Balloon(nIdx) {
  this.nIdx  = nIdx;
  this.role  = ROLES[nIdx];
  this.col   = COLS[nIdx];
  this.shine = SHINE[nIdx];
  this.shad  = SHAD[nIdx];
  this.state = 'idle';
  this.x     = LANES[nIdx] * W;
  this.y     = NOZZLE_Y;
  this.r     = 0;
  this.maxR  = (28 + Math.floor(Math.random()*8)*PX);
  this.vy    = 0;
  this.vx    = 0;
  this.fx    = null;
  this.fxCol = COLS[nIdx];
  this.glowT = 0;
  this.swellStart = 0;
  this.swellDur   = barLen() * 2;
  this.particles  = [];
  this._src  = null;
  this._mst  = null;
  this._cfEl = document.getElementById('cf'+(nIdx+1));
}

Balloon.prototype.startSwell = function() {
  this.state = 'swelling';
  this.x = LANES[this.nIdx] * W;
  this.y = NOZZLE_Y;
  this.r = PX*2;
  this.vy = 0; this.vx = 0;
  this.fx = null; this.fxCol = this.col;
  this.swellStart = performance.now();
  this.swellDur = barLen() * 2;
  this.startAudio();
};

Balloon.prototype.startAudio = function() {
  this.stopAudio();
  if (!AC) return;
  var buf = null;
  if (this.role === 'sample') { buf = fullBuffer; }
  else if (this.role === 'baile') { buf = BEAT.baile; }
  else { buf = BEAT.dub; }
  if (!buf) return;
  var mst = AC.createGain(); mst.gain.value = 0.75; mst.connect(dest());
  var src = AC.createBufferSource(); src.buffer = buf; src.loop = true;
  src.connect(mst); src.start();
  this._src = src; this._mst = mst;
};

Balloon.prototype.stopAudio = function() {
  if (this._src) { try { this._src.stop(); } catch(e){} this._src = null; }
  if (this._mst) { try { this._mst.disconnect(); } catch(e){} this._mst = null; }
};

Balloon.prototype.release = function() {
  if (this.state !== 'swelling') return;
  this.state = 'falling';
  this.vy = 2.5 + Math.random()*1.5;
  this.vx = (Math.random()-.5)*2;
  this.glowT = 60;
  this.fx = randFX();
  this.fxCol = this.fx.c;
  if (this._cfEl) this._cfEl.style.width = '100%';

  // Apply FX to running audio
  if (this._src && this._mst) {
    var fx = this.fx;
    fx.fn(this._src, this._src.buffer, this._mst);
  }
  showToast(this.fx.n, this.fx.c);
};

Balloon.prototype.update = function(dt) {
  this.x = LANES[this.nIdx] * W; // track lane

  if (this.state === 'swelling') {
    var elapsed = (performance.now() - this.swellStart) / 1000;
    var t = Math.min(1, elapsed / this.swellDur);
    var ease = t < .5 ? 2*t*t : 1-2*(1-t)*(1-t);
    var pulse = 1 + .04*Math.sin(elapsed*(BPM/60)*Math.PI*2);
    this.r = Math.max(PX*2, Math.round((PX*2 + (this.maxR - PX*2)*ease)*pulse / PX)*PX);
    if (this._cfEl) this._cfEl.style.width = (t*100) + '%';
    if (t >= 1) this.release();
  }

  if (this.state === 'falling') {
    this.vy += 0.3*dt*60;
    this.y  += this.vy*dt*60;
    this.x  += this.vx*dt*60;
    this.vx *= Math.pow(.97, dt*60);
    if (this.glowT > 0) this.glowT -= dt*60;
    if (this.y > H + this.r + 30) this.pop();
  }

  if (this.state === 'splash') {
    var alive = false;
    for (var i = 0; i < this.particles.length; i++) {
      var p = this.particles[i];
      p.x += p.vx*dt*60; p.y += p.vy*dt*60;
      p.vy += .2*dt*60; p.a -= dt*1.8;
      if (p.a > 0) alive = true;
    }
    if (!alive) {
      this.state = 'idle';
      if (this._cfEl) this._cfEl.style.width = '0%';
      var self = this;
      setTimeout(function() {
        if (self.state === 'idle') self.startSwell();
      }, 400 + Math.random()*300);
    }
  }
};

Balloon.prototype.pop = function() {
  this.state = 'splash';
  this.stopAudio();
  this.particles = [];
  for (var i = 0; i < 20; i++) {
    var a = Math.random()*Math.PI*2, sp = 1.5+Math.random()*3.5;
    this.particles.push({
      x:0, y:0,
      vx:Math.cos(a)*sp, vy:Math.sin(a)*sp-2,
      a:.8+Math.random()*.2
    });
  }
};

Balloon.prototype.contains = function(tx, ty) {
  if (this.state !== 'swelling') return false;
  return (tx-this.x)*(tx-this.x)+(ty-this.y)*(ty-this.y) <= (this.r+16)*(this.r+16);
};

Balloon.prototype.draw = function() {
  if (this.state === 'idle') return;

  var cx = px(this.x), cy = px(this.y), r = this.r;
  var col = this.fxCol, fill = this.col, shine = this.shine, shad = this.shad;

  if (this.state === 'splash') {
    for (var i = 0; i < this.particles.length; i++) {
      var p = this.particles[i];
      if (p.a <= 0) continue;
      ctx.fillStyle = rgba(col, p.a);
      ctx.fillRect(px(cx+p.x), px(cy+p.y), PX*2, PX*2);
    }
    return;
  }

  // Glow
  if (this.glowT > 0) {
    var ga = Math.min(1, this.glowT/60)*.2;
    ctx.save();
    ctx.shadowColor = col; ctx.shadowBlur = 28*(this.glowT/60);
    ctx.fillStyle = rgba(col, ga);
    ctx.beginPath(); ctx.arc(cx, cy, r+10, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  if (this.state === 'swelling') {
    // Nozzle stem
    ctx.fillStyle = shad;
    ctx.fillRect(cx-PX, NOZZLE_Y, PX*2, Math.max(0, cy-NOZZLE_Y));
    pixCircle(cx, cy, r, fill, shine, shad);
    // Label inside
    if (r > 16) {
      ctx.save();
      ctx.font = Math.max(6, Math.min(9, r*.38)) + 'px "Press Start 2P"';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillStyle = 'rgba(255,255,255,.5)';
      var lbl = this.role==='sample'?'SMP':this.role==='baile'?'BLF':'DUB';
      ctx.fillText(lbl, cx, cy);
      ctx.restore();
    }
  }

  if (this.state === 'falling') {
    pixDrop(cx, cy, r, fill, shine, shad);
    // Trail
    for (var i=1; i<=6; i++) {
      var ty2 = px(cy - i*r*0.28), tr2 = Math.max(PX, Math.round(r*(1-i/6)*.45/PX)*PX);
      ctx.fillStyle = rgba(col, (1-i/6)*.15);
      ctx.fillRect(cx-tr2, ty2-tr2, tr2*2, tr2*2);
    }
    // FX label
    if (this.fx && r > 10) {
      ctx.save();
      ctx.font = Math.max(5, Math.min(7, r*.32)) + 'px "Press Start 2P"';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillStyle = '#000';
      ctx.fillText(this.fx.n, cx+PX, cy+PX);
      ctx.fillStyle = this.fx.c;
      ctx.fillText(this.fx.n, cx, cy);
      ctx.restore();
    }
  }
};

// ══════════════════════════════════════════
//  BACKGROUND
// ══════════════════════════════════════════
function drawBg() {
  ctx.clearRect(0, 0, W, H);
  // Pixel grid
  ctx.fillStyle = 'rgba(36,27,56,.16)';
  for (var x=0; x<W; x+=PX*4) ctx.fillRect(x, 0, 1, H);
  for (var y=0; y<H; y+=PX*4) ctx.fillRect(0, y, W, 1);
  // Vignette
  var vg = ctx.createRadialGradient(W*.5,H*.5,H*.06,W*.5,H*.5,H*.96);
  vg.addColorStop(0,'rgba(0,0,0,0)');
  vg.addColorStop(1,'rgba(0,0,0,.72)');
  ctx.fillStyle = vg; ctx.fillRect(0,0,W,H);
  // Lane dashes
  for (var i=0; i<3; i++) {
    var lx = px(LANES[i]*W), col2 = COLS[i];
    ctx.fillStyle = rgba(col2, .07);
    for (var y2=NOZZLE_Y; y2<H; y2+=PX*6) ctx.fillRect(lx-PX, y2, PX*2, PX*3);
  }
  // Nozzle heads
  for (var i=0; i<3; i++) {
    var nx = px(LANES[i]*W);
    ctx.fillStyle = SHAD[i];
    ctx.fillRect(nx-PX*5, NOZZLE_Y-PX*8, PX*10, PX*8);
    ctx.fillStyle = COLS[i];
    ctx.fillRect(nx-PX*4, NOZZLE_Y-PX*9, PX*8, PX*8);
    ctx.fillRect(nx-PX*2, NOZZLE_Y-PX*2, PX*4, PX*3);
    ctx.fillStyle = SHINE[i];
    ctx.fillRect(nx-PX*3, NOZZLE_Y-PX*8, PX*2, PX*3);
  }
  // Scanlines
  ctx.fillStyle = 'rgba(0,0,0,.1)';
  for (var y3=0; y3<H; y3+=4) ctx.fillRect(0, y3+2, W, 2);
}

// ══════════════════════════════════════════
//  MAIN LOOP
// ══════════════════════════════════════════
var appStarted = false, lastT = 0;

function loop(ts) {
  requestAnimationFrame(loop);
  if (!appStarted) return;
  var dt = Math.min((ts-lastT)/1000, .05);
  lastT = ts;
  drawBg();
  for (var i=0; i<balloons.length; i++) {
    balloons[i].update(dt);
    balloons[i].draw();
  }
}
requestAnimationFrame(loop);

// ══════════════════════════════════════════
//  TOAST
// ══════════════════════════════════════════
var toastRaf = 0, toastTimer = 0;
function showToast(name, col) {
  var el = document.getElementById('toast');
  el.textContent = '[ ' + name + ' ]';
  el.style.color = col;
  el.style.borderColor = col;
  el.style.opacity = '1';
  toastTimer = 160;
  cancelAnimationFrame(toastRaf);
  function fade() {
    toastTimer--;
    if (toastTimer < 50) el.style.opacity = (toastTimer/50).toFixed(2);
    if (toastTimer > 0) toastRaf = requestAnimationFrame(fade);
    else el.style.opacity = '0';
  }
  toastRaf = requestAnimationFrame(fade);
}

// ══════════════════════════════════════════
//  SPAWN BALLOON
// ══════════════════════════════════════════
function spawnBalloon(nIdx) {
  if (!appStarted) return;
  if (nIdx === 0 && !fullBuffer) return;
  var existing = null;
  for (var i=0; i<balloons.length; i++) if (balloons[i].nIdx===nIdx) { existing=balloons[i]; break; }
  if (existing) {
    if (existing.state === 'swelling') existing.release();
    return;
  }
  var b = new Balloon(nIdx);
  balloons.push(b);
  b.startSwell();
}

// ══════════════════════════════════════════
//  CANVAS TAP
// ══════════════════════════════════════════
function canvasTap(tx, ty) {
  if (!appStarted) return;
  for (var i=0; i<balloons.length; i++) {
    if (balloons[i].contains(tx, ty)) { balloons[i].release(); return; }
  }
  // tap anywhere near a swelling balloon
  var best = null, bestD = 160;
  for (var i=0; i<balloons.length; i++) {
    if (balloons[i].state !== 'swelling') continue;
    var d = Math.hypot(tx - balloons[i].x, ty - balloons[i].y);
    if (d < bestD) { bestD = d; best = balloons[i]; }
  }
  if (best) best.release();
}

var lastCanvasTap = 0;
canvas.addEventListener('touchend', function(e) {
  e.preventDefault();
  var now = Date.now(); if (now-lastCanvasTap < 200) return; lastCanvasTap = now;
  var t = e.changedTouches[0];
  canvasTap(t.clientX, t.clientY);
}, { passive: false });
canvas.addEventListener('click', function(e) {
  var now = Date.now(); if (now-lastCanvasTap < 300) return; lastCanvasTap = now;
  canvasTap(e.clientX, e.clientY);
});

// ══════════════════════════════════════════
//  LAUNCH APP
// ══════════════════════════════════════════
function launchApp() {
  if (!fullBuffer) return;
  initAC();
  try {
    buildDrums();
    startClock();
  } catch(e) {
    console.error('Launch error:', e);
    document.getElementById('rec-status').textContent = 'ERROR: ' + e.message;
    return;
  }
  appStarted = true;
  lastT = performance.now();
  showScreen('s-main');
  setTimeout(function(){ spawnBalloon(0); }, 200);
  setTimeout(function(){ spawnBalloon(1); }, 500);
  setTimeout(function(){ spawnBalloon(2); }, 800);
}

// ══════════════════════════════════════════
//  RECORDING
// ══════════════════════════════════════════
var fullBuffer = null;
var mediaStream = null, mediaRecorder = null, recChunks = [];
var isRecording = false, recStartT = 0, recTimerRaf = 0;
var analyserNode = null, waveRaf = 0;

var wfCan = document.getElementById('waveform');
var wfCtx = wfCan.getContext('2d');

function setStatus(t) { document.getElementById('rec-status').textContent = t; }

function drawWaveLive() {
  if (!analyserNode) { waveRaf = requestAnimationFrame(drawWaveLive); return; }
  var data = new Uint8Array(analyserNode.fftSize);
  analyserNode.getByteTimeDomainData(data);
  var cw = wfCan.width, ch = wfCan.height;
  wfCtx.fillStyle = '#110e1c'; wfCtx.fillRect(0,0,cw,ch);
  var bw = Math.max(2, Math.floor(cw/data.length*2));
  for (var x=0; x<cw; x+=bw) {
    var idx = Math.floor(x/cw*data.length);
    var v = (data[Math.min(idx,data.length-1)]/128-1)*(ch/2);
    wfCtx.fillStyle = '#cc44ff';
    wfCtx.fillRect(x, ch/2-Math.abs(v), bw-1, Math.max(2,Math.abs(v)*2));
  }
  waveRaf = requestAnimationFrame(drawWaveLive);
}

function drawWaveStatic(buf) {
  var cw=wfCan.width, ch=wfCan.height, data=buf.getChannelData(0);
  var step=Math.ceil(data.length/cw);
  wfCtx.fillStyle='#08060f'; wfCtx.fillRect(0,0,cw,ch);
  for (var x=0; x<cw; x+=2) {
    var mn=1, mx=-1;
    for (var s=0; s<step*2; s++) { var v=data[x*step+s]||0; if(v<mn)mn=v; if(v>mx)mx=v; }
    var y1=Math.floor(ch/2+mn*ch*.46), y2=Math.floor(ch/2+mx*ch*.46);
    wfCtx.fillStyle='#cc44ff';
    wfCtx.fillRect(x, Math.min(y1,y2), 1, Math.max(1,Math.abs(y2-y1)));
  }
}

function updateTimer() {
  var e = (Date.now()-recStartT)/1000;
  var mm = Math.floor(e/60).toString().padStart(2,'0');
  var ss = Math.floor(e%60).toString().padStart(2,'0');
  document.getElementById('rec-timer').textContent = mm+':'+ss;
  if (isRecording) recTimerRaf = requestAnimationFrame(updateTimer);
}

function getSupportedMime() {
  var types = ['audio/webm;codecs=opus','audio/webm','audio/ogg;codecs=opus','audio/mp4'];
  for (var i=0; i<types.length; i++) if (MediaRecorder.isTypeSupported(types[i])) return types[i];
  return '';
}

async function startRecording() {
  // Must init AC on user gesture for iOS
  initAC();

  try {
    mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
  } catch(e) {
    setStatus('MIC DENIED');
    return;
  }

  var msrc = AC.createMediaStreamSource(mediaStream);
  analyserNode = AC.createAnalyser(); analyserNode.fftSize = 512;
  msrc.connect(analyserNode);

  recChunks = []; isRecording = true; recStartT = Date.now();

  document.getElementById('rec-btn').classList.add('recording');
  document.getElementById('rec-timer').textContent = '00:00';
  document.getElementById('launch-btn').style.display = 'none';
  document.getElementById('rerec-btn').style.display = 'none';
  setStatus('TAP TO STOP');
  updateTimer();
  drawWaveLive();

  var mime = getSupportedMime();
  try {
    mediaRecorder = new MediaRecorder(mediaStream, mime ? {mimeType: mime} : {});
  } catch(e) {
    mediaRecorder = new MediaRecorder(mediaStream);
  }
  mediaRecorder.ondataavailable = function(e) { if (e.data && e.data.size>0) recChunks.push(e.data); };
  mediaRecorder.onstop = processRecording;
  mediaRecorder.start(100);
}

function stopRecording() {
  if (!isRecording) return;
  isRecording = false;
  cancelAnimationFrame(recTimerRaf);
  cancelAnimationFrame(waveRaf);
  if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
  if (mediaStream) mediaStream.getTracks().forEach(function(t){ t.stop(); });
  document.getElementById('rec-btn').classList.remove('recording');
  document.getElementById('rec-timer').textContent = '';
  setStatus('PROCESSING...');
}

async function processRecording() {
  if (!recChunks.length) { setStatus('NO AUDIO - RETRY'); document.getElementById('rerec-btn').style.display='block'; return; }
  var mime = (recChunks[0] && recChunks[0].type) ? recChunks[0].type : 'audio/webm';
  var blob = new Blob(recChunks, { type: mime });
  var arrayBuf;
  try { arrayBuf = await blob.arrayBuffer(); } catch(e) { setStatus('READ ERROR'); document.getElementById('rerec-btn').style.display='block'; return; }
  try { fullBuffer = await AC.decodeAudioData(arrayBuf); } catch(e) { setStatus('DECODE ERROR'); document.getElementById('rerec-btn').style.display='block'; return; }
  if (!fullBuffer || fullBuffer.duration < 0.2) { setStatus('TOO SHORT'); document.getElementById('rerec-btn').style.display='block'; return; }
  drawWaveStatic(fullBuffer);
  setStatus('READY  ' + fullBuffer.duration.toFixed(1) + 'S');
  document.getElementById('launch-btn').style.display = 'block';
  document.getElementById('rerec-btn').style.display = 'block';
}

// ══════════════════════════════════════════
//  BUTTON WIRING — simple and direct
// ══════════════════════════════════════════
tap(document.getElementById('rec-btn'), function() {
  if (isRecording) stopRecording(); else startRecording();
});

tap(document.getElementById('launch-btn'), function() {
  launchApp();
});

tap(document.getElementById('rerec-btn'), function() {
  fullBuffer = null;
  document.getElementById('launch-btn').style.display = 'none';
  document.getElementById('rerec-btn').style.display = 'none';
  wfCtx.fillStyle = '#08060f'; wfCtx.fillRect(0,0,wfCan.width,wfCan.height);
  setStatus('TAP TO RECORD');
});

tap(document.getElementById('newrec'), function() {
  for (var i=0; i<balloons.length; i++) balloons[i].stopAudio();
  balloons = []; appStarted = false; clockOn = false; fullBuffer = null;
  showScreen('s-rec');
  document.getElementById('launch-btn').style.display = 'none';
  document.getElementById('rerec-btn').style.display = 'none';
  wfCtx.fillStyle = '#08060f'; wfCtx.fillRect(0,0,wfCan.width,wfCan.height);
  setStatus('TAP TO RECORD');
  document.getElementById('rec-timer').textContent = '';
  document.querySelectorAll('.sq').forEach(function(d){ d.classList.remove('on'); });
});

tap(document.getElementById('n1'), function() { spawnBalloon(0); });
tap(document.getElementById('n2'), function() { spawnBalloon(1); });
tap(document.getElementById('n3'), function() { spawnBalloon(2); });

tap(document.getElementById('bdn'), function() {
  BPM = Math.max(60, BPM-5); updBPM();
});
tap(document.getElementById('bup'), function() {
  BPM = Math.min(200, BPM+5); updBPM();
});
