<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>DRIP — Record & Cascade</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Playfair+Display:ital,wght@1,900&display=swap');
:root{
  --bg:#060a0d; --c1:#00e5ff; --c2:#00ff88; --c3:#ff3cac;
  --gold:#ffd740; --text:#c8d8e8; --red:#ff4455;
}
*{margin:0;padding:0;box-sizing:border-box;touch-action:none;user-select:none;}
html,body{width:100vw;height:100vh;overflow:hidden;background:var(--bg);}
canvas{position:fixed;inset:0;width:100%;height:100%;}

/* ── RECORD OVERLAY ── */
#rec-overlay{
  position:fixed;inset:0;z-index:60;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;
}
#rec-title{
  font-family:'Playfair Display',serif;font-style:italic;
  font-size:3rem;color:var(--c1);
  text-shadow:0 0 40px rgba(0,229,255,.5);
  animation:pulse 2.2s ease-in-out infinite;
}
#rec-sub{
  font-family:'Space Mono',monospace;font-size:.58rem;
  letter-spacing:.3em;color:var(--text);opacity:.4;
}
#rec-instruct{
  font-family:'Space Mono',monospace;font-size:.6rem;
  letter-spacing:.12em;color:var(--text);opacity:.6;
  text-align:center;line-height:2;max-width:300px;
}

/* waveform canvas */
#waveform{
  width:280px;height:60px;border-radius:6px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
}

/* record button */
#rec-btn{
  width:80px;height:80px;border-radius:50%;border:none;
  background:radial-gradient(circle at 38% 38%,#ff6677,var(--red));
  box-shadow:0 0 30px rgba(255,68,85,.45),inset 0 2px 0 rgba(255,255,255,.15);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:transform .1s,box-shadow .1s;outline:none;
  -webkit-tap-highlight-color:transparent;
}
#rec-btn:active{transform:scale(.93);}
#rec-btn.recording{
  animation:recpulse .8s ease-in-out infinite;
  box-shadow:0 0 50px rgba(255,68,85,.8),inset 0 2px 0 rgba(255,255,255,.15);
}
#rec-icon{width:28px;height:28px;border-radius:50%;background:#fff;}
#rec-icon.stop{border-radius:5px;width:22px;height:22px;}

#rec-label{
  font-family:'Space Mono',monospace;font-size:.55rem;
  letter-spacing:.2em;color:var(--text);opacity:.5;
}
#rec-timer{
  font-family:'Space Mono',monospace;font-size:1.4rem;
  color:var(--red);opacity:0;transition:opacity .2s;
  text-shadow:0 0 16px rgba(255,68,85,.6);
  letter-spacing:.1em;
}

/* use-btn */
#use-btn{
  padding:12px 32px;border:none;border-radius:6px;cursor:pointer;
  font-family:'Space Mono',monospace;font-size:.7rem;font-weight:700;
  letter-spacing:.15em;text-transform:uppercase;
  background:linear-gradient(135deg,#005c3a,#00ff88 200%);
  color:var(--c2);box-shadow:0 0 24px rgba(0,255,136,.3);
  display:none;transition:transform .08s,filter .1s;outline:none;
  -webkit-tap-highlight-color:transparent;
}
#use-btn:active{transform:scale(.94);filter:brightness(1.3);}
#re-rec{
  font-family:'Space Mono',monospace;font-size:.5rem;
  letter-spacing:.18em;color:var(--text);opacity:.35;
  cursor:pointer;display:none;text-decoration:underline;
  background:none;border:none;padding:0;
  -webkit-tap-highlight-color:transparent;
}

/* ── MAIN UI ── */
#ui{position:fixed;top:0;left:0;right:0;z-index:20;pointer-events:none;}
#header{display:flex;align-items:flex-start;justify-content:space-between;padding:12px 18px 0;}
#title{
  font-family:'Playfair Display',serif;font-style:italic;
  font-size:1.5rem;color:var(--text);letter-spacing:.05em;opacity:.75;
}
#title span{color:var(--c1);}
#hint{
  font-family:'Space Mono',monospace;font-size:.47rem;
  color:var(--text);opacity:.28;text-align:right;line-height:1.9;padding-top:3px;
}
#nozzle-row{
  display:flex;justify-content:space-around;
  padding:8px 10px 0;pointer-events:all;
}
.nw{display:flex;flex-direction:column;align-items:center;gap:3px;}
.nl{font-family:'Space Mono',monospace;font-size:.42rem;letter-spacing:.16em;opacity:.5;}
.nb{
  width:80px;height:40px;border:none;border-radius:5px 5px 10px 10px;cursor:pointer;
  font-family:'Space Mono',monospace;font-size:.58rem;font-weight:700;
  letter-spacing:.06em;text-transform:uppercase;
  transition:transform .07s,filter .1s;outline:none;
  -webkit-tap-highlight-color:transparent;
}
.nb:active{transform:scale(.9);filter:brightness(1.6);}
.nb.n1{background:linear-gradient(150deg,#003f5c,#006e7f);color:var(--c1);
  box-shadow:0 0 22px rgba(0,229,255,.3),inset 0 1px 0 rgba(255,255,255,.1);}
.nb.n2{background:linear-gradient(150deg,#003828,#005c3a);color:var(--c2);
  box-shadow:0 0 22px rgba(0,255,136,.3),inset 0 1px 0 rgba(255,255,255,.1);}
.nb.n3{background:linear-gradient(150deg,#3a0028,#5c0042);color:var(--c3);
  box-shadow:0 0 22px rgba(255,60,172,.3),inset 0 1px 0 rgba(255,255,255,.1);}

/* re-record button in main ui */
#new-rec-btn{
  position:fixed;bottom:36px;left:50%;transform:translateX(-50%);
  z-index:25;pointer-events:all;
  padding:8px 20px;border:1px solid rgba(255,255,255,.12);border-radius:20px;
  background:rgba(255,255,255,.05);cursor:pointer;
  font-family:'Space Mono',monospace;font-size:.48rem;letter-spacing:.18em;
  color:var(--text);opacity:.45;
  transition:opacity .2s,background .2s;outline:none;
  -webkit-tap-highlight-color:transparent;
}
#new-rec-btn:active{opacity:.9;background:rgba(255,255,255,.1);}

#fx-banner{
  position:fixed;bottom:60px;left:0;right:0;text-align:center;
  font-family:'Space Mono',monospace;font-size:.72rem;letter-spacing:.22em;
  pointer-events:none;opacity:0;transition:opacity .25s;
}
#bot{
  position:fixed;bottom:14px;left:0;right:0;text-align:center;
  font-family:'Space Mono',monospace;font-size:.42rem;letter-spacing:.22em;
  color:var(--text);opacity:.12;pointer-events:none;
}

@keyframes pulse{
  0%,100%{text-shadow:0 0 30px rgba(0,229,255,.38)}
  50%{text-shadow:0 0 65px rgba(0,229,255,.82)}
}
@keyframes recpulse{
  0%,100%{box-shadow:0 0 35px rgba(255,68,85,.6),inset 0 2px 0 rgba(255,255,255,.15)}
  50%{box-shadow:0 0 65px rgba(255,68,85,.95),inset 0 2px 0 rgba(255,255,255,.15)}
}
</style>
</head>
<body>

<!-- ══ RECORD OVERLAY ══ -->
<div id="rec-overlay">
  <div id="rec-title">DRIP</div>
  <div id="rec-sub">RECORD · CASCADE · TRANSFORM</div>
  <div id="rec-instruct">tap to start recording a beat,<br>a voice, an instrument — anything.<br>tap again to stop.</div>
  <canvas id="waveform" width="280" height="60"></canvas>
  <div id="rec-timer">0:00</div>
  <button id="rec-btn" aria-label="Record"><div id="rec-icon"></div></button>
  <div id="rec-label">TAP TO RECORD</div>
  <button id="use-btn">▶ USE THIS SAMPLE</button>
  <button id="re-rec">↺ record again</button>
</div>

<!-- ══ MAIN CANVAS ══ -->
<canvas id="c"></canvas>

<div id="ui">
  <div id="header">
    <div id="title"><span>DRIP</span> — cascade</div>
    <div id="hint">tap screen → ramp + fx<br>ramps deflect &amp; transform</div>
  </div>
  <div id="nozzle-row">
    <div class="nw">
      <div class="nl" style="color:var(--c1)">LANE 1</div>
      <button class="nb n1" id="b1">▼ DRIP</button>
    </div>
    <div class="nw">
      <div class="nl" style="color:var(--c2)">LANE 2</div>
      <button class="nb n2" id="b2">▼ DRIP</button>
    </div>
    <div class="nw">
      <div class="nl" style="color:var(--c3)">LANE 3</div>
      <button class="nb n3" id="b3">▼ DRIP</button>
    </div>
  </div>
</div>

<button id="new-rec-btn">⏺ new recording</button>
<div id="fx-banner"></div>
<div id="bot">DRIP / INTERACTIVE AUDIO ART</div>

<script>
/* ══════════════════════════════════════════════════════
   DRIP v4 — Mic Recording → Random Snippet Cascade
   ══════════════════════════════════════════════════════
   Flow:
   1. User records audio via mic (hold rec button)
   2. Recording decoded into AudioBuffer
   3. On each drip spawn: slice a random 0.25–0.8s chunk
      from the full buffer → loop that chunk as the drip
   4. FX ramps re-patch the live looping source
   ══════════════════════════════════════════════════════ */

// ── Canvas setup ────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W, H;
function resize(){ W=canvas.width=window.innerWidth; H=canvas.height=window.innerHeight; }
resize(); window.addEventListener('resize', resize);

// ── Audio context ────────────────────────────────────
let AC = null;
function initAC(){
  if(AC) return;
  AC = new(window.AudioContext||window.webkitAudioContext)();
  if(AC.state==='suspended') AC.resume();
}

// ── Recording state ─────────────────────────────────
let mediaStream   = null;
let mediaRecorder = null;
let recChunks     = [];
let isRecording   = false;
let recStartTime  = 0;
let recTimerRAF   = null;
let fullBuffer    = null;   // decoded AudioBuffer of entire recording
let snippets      = [];     // pre-sliced snippet AudioBuffers

// Waveform analyser during recording
let analyserNode  = null;
let waveRAF       = null;
const wfCanvas    = document.getElementById('waveform');
const wfCtx       = wfCanvas.getContext('2d');

// ── Waveform visualiser (live) ───────────────────────
function drawWaveformLive(){
  if(!analyserNode){ waveRAF=requestAnimationFrame(drawWaveformLive); return; }
  const data = new Uint8Array(analyserNode.fftSize);
  analyserNode.getByteTimeDomainData(data);
  const cw=wfCanvas.width, ch=wfCanvas.height;
  wfCtx.clearRect(0,0,cw,ch);
  wfCtx.fillStyle='rgba(6,10,13,0)';
  wfCtx.clearRect(0,0,cw,ch);
  wfCtx.strokeStyle='#ff4455';
  wfCtx.lineWidth=1.5;
  wfCtx.shadowColor='#ff4455';
  wfCtx.shadowBlur=8;
  wfCtx.beginPath();
  const step=cw/data.length;
  for(let i=0;i<data.length;i++){
    const v=(data[i]/128-1)*(ch/2);
    const x=i*step, y=ch/2+v;
    i===0?wfCtx.moveTo(x,y):wfCtx.lineTo(x,y);
  }
  wfCtx.stroke();
  waveRAF=requestAnimationFrame(drawWaveformLive);
}

function drawWaveformStatic(audioBuf){
  const cw=wfCanvas.width, ch=wfCanvas.height;
  const data=audioBuf.getChannelData(0);
  const step=Math.ceil(data.length/cw);
  wfCtx.clearRect(0,0,cw,ch);
  wfCtx.strokeStyle='var(--c2)';
  wfCtx.lineWidth=1.2;
  wfCtx.shadowColor='#00ff88';
  wfCtx.shadowBlur=6;
  wfCtx.beginPath();
  for(let x=0;x<cw;x++){
    let min=1,max=-1;
    for(let s=0;s<step;s++){
      const v=data[x*step+s]||0;
      if(v<min)min=v; if(v>max)max=v;
    }
    const y1=ch/2+(min*ch/2), y2=ch/2+(max*ch/2);
    wfCtx.moveTo(x,y1); wfCtx.lineTo(x,y2);
  }
  wfCtx.stroke();
}

// ── Timer display ────────────────────────────────────
function updateTimer(){
  const el=document.getElementById('rec-timer');
  const elapsed=(Date.now()-recStartTime)/1000;
  const s=Math.floor(elapsed%60).toString().padStart(2,'0');
  const m=Math.floor(elapsed/60);
  el.textContent=`${m}:${s}`;
  if(isRecording) recTimerRAF=requestAnimationFrame(updateTimer);
}

// ── Start recording ──────────────────────────────────
async function startRecording(){
  initAC();
  try{
    mediaStream = await navigator.mediaDevices.getUserMedia({audio:true,video:false});
  }catch(e){
    alert('Microphone access denied. Please allow mic access and reload.');
    return;
  }

  // Live waveform via analyser
  const srcNode = AC.createMediaStreamSource(mediaStream);
  analyserNode  = AC.createAnalyser();
  analyserNode.fftSize = 512;
  srcNode.connect(analyserNode);

  recChunks=[]; isRecording=true;
  recStartTime=Date.now();

  // UI state
  const btn=document.getElementById('rec-btn');
  const icon=document.getElementById('rec-icon');
  btn.classList.add('recording');
  icon.classList.add('stop');
  document.getElementById('rec-label').textContent='TAP TO STOP';
  document.getElementById('rec-timer').style.opacity='1';
  document.getElementById('use-btn').style.display='none';
  document.getElementById('re-rec').style.display='none';
  updateTimer();
  drawWaveformLive();

  mediaRecorder = new MediaRecorder(mediaStream,{mimeType: getSupportedMime()});
  mediaRecorder.ondataavailable = e=>{ if(e.data.size>0) recChunks.push(e.data); };
  mediaRecorder.onstop = onRecordingStop;
  mediaRecorder.start(100);
}

function getSupportedMime(){
  const types=['audio/webm;codecs=opus','audio/webm','audio/ogg;codecs=opus','audio/mp4'];
  for(const t of types) if(MediaRecorder.isTypeSupported(t)) return t;
  return '';
}

// ── Stop recording ───────────────────────────────────
function stopRecording(){
  if(!isRecording) return;
  isRecording=false;
  cancelAnimationFrame(recTimerRAF);
  cancelAnimationFrame(waveRAF);
  if(mediaRecorder && mediaRecorder.state!=='inactive') mediaRecorder.stop();
  if(mediaStream) mediaStream.getTracks().forEach(t=>t.stop());
  const btn=document.getElementById('rec-btn');
  const icon=document.getElementById('rec-icon');
  btn.classList.remove('recording');
  icon.classList.remove('stop');
  document.getElementById('rec-label').textContent='PROCESSING…';
  document.getElementById('rec-timer').style.opacity='0';
}

async function onRecordingStop(){
  const blob = new Blob(recChunks, {type: recChunks[0]?.type||'audio/webm'});
  const arrayBuf = await blob.arrayBuffer();
  try{
    fullBuffer = await AC.decodeAudioData(arrayBuf);
  }catch(e){
    document.getElementById('rec-label').textContent='DECODE ERROR — TRY AGAIN';
    return;
  }
  if(fullBuffer.duration < 0.3){
    document.getElementById('rec-label').textContent='TOO SHORT — RECORD LONGER';
    document.getElementById('re-rec').style.display='block';
    return;
  }
  // Build snippet pool from the recording
  buildSnippets(fullBuffer);
  drawWaveformStatic(fullBuffer);
  document.getElementById('rec-label').textContent='SAMPLE READY  (' + fullBuffer.duration.toFixed(1) + 's)';
  document.getElementById('use-btn').style.display='block';
  document.getElementById('re-rec').style.display='block';
}

// ── Snippet slicing ───────────────────────────────────
// Pre-slice N random windows from the recorded buffer.
// Each snippet is 0.2–0.75s of audio, with fade in/out.
const SNIPPET_COUNT   = 24;
const SNIPPET_MIN_DUR = 0.18;
const SNIPPET_MAX_DUR = 0.72;

function buildSnippets(buf){
  snippets = [];
  const sr   = buf.sampleRate;
  const total = buf.length;
  const ch0  = buf.getChannelData(0);
  const ch1  = buf.numberOfChannels > 1 ? buf.getChannelData(1) : null;

  for(let i=0; i<SNIPPET_COUNT; i++){
    const dur    = SNIPPET_MIN_DUR + Math.random()*(SNIPPET_MAX_DUR-SNIPPET_MIN_DUR);
    const snLen  = Math.floor(dur*sr);
    const maxOff = Math.max(0, total - snLen);
    const off    = Math.floor(Math.random()*maxOff);

    const snBuf = AC.createBuffer(ch1?2:1, snLen, sr);
    const fadeLen = Math.min(Math.floor(sr*0.025), Math.floor(snLen*0.12)); // 25ms fade

    for(let c=0;c<snBuf.numberOfChannels;c++){
      const src = c===0 ? ch0 : ch1;
      const dst = snBuf.getChannelData(c);
      for(let s=0;s<snLen;s++){
        let v = src[off+s] || 0;
        // fade in
        if(s < fadeLen) v *= s/fadeLen;
        // fade out
        if(s > snLen-fadeLen) v *= (snLen-s)/fadeLen;
        dst[s] = v;
      }
    }
    snippets.push(snBuf);
  }
}

function randSnippet(){
  if(!snippets.length) return null;
  return snippets[Math.floor(Math.random()*snippets.length)];
}

// ── FX List ──────────────────────────────────────────
function makeDistCurve(k=300){
  const n=256,c=new Float32Array(n);
  for(let i=0;i<n;i++){const x=(i*2)/n-1;c[i]=((Math.PI+k)*x)/(Math.PI+k*Math.abs(x));}
  return c;
}

const FX_LIST=[
  {name:'PITCH ↑',   color:'#ff6b35', fn:(src,m)=>{ src.playbackRate.value=1.6;  src.connect(m); }},
  {name:'PITCH ↓',   color:'#4ecdc4', fn:(src,m)=>{ src.playbackRate.value=0.6;  src.connect(m); }},
  {name:'SLOW ×0.5', color:'#9b8cff', fn:(src,m)=>{ src.playbackRate.value=0.5;  src.connect(m); }},
  {name:'SPEED ×2',  color:'#00e5ff', fn:(src,m)=>{ src.playbackRate.value=2.0;  src.connect(m); }},
  {name:'REVERSE',   color:'#ff3cac', fn:(src,m)=>{
    const b=src.buffer, rev=AC.createBuffer(b.numberOfChannels,b.length,b.sampleRate);
    for(let c=0;c<b.numberOfChannels;c++){
      const s=b.getChannelData(c),d=rev.getChannelData(c);
      for(let i=0;i<s.length;i++) d[i]=s[s.length-1-i];
    }
    src.buffer=rev; src.connect(m);
  }},
  {name:'DELAY',     color:'#ffe66d', fn:(src,m)=>{
    const dl=AC.createDelay(1.5); dl.delayTime.value=0.22;
    const fb=AC.createGain(); fb.gain.value=0.42;
    src.connect(m); src.connect(dl); dl.connect(fb); fb.connect(dl); dl.connect(m);
  }},
  {name:'DISTORT',   color:'#f7263c', fn:(src,m)=>{
    const w=AC.createWaveShaper(); w.curve=makeDistCurve(320);
    const g=AC.createGain(); g.gain.value=0.45;
    src.connect(w); w.connect(g); g.connect(m);
  }},
  {name:'TAPE COMP', color:'#a8e063', fn:(src,m)=>{
    const c=AC.createDynamicsCompressor();
    c.threshold.value=-20;c.knee.value=26;c.ratio.value=10;
    c.attack.value=0.003;c.release.value=0.2;
    src.connect(c); c.connect(m);
  }},
  {name:'OVERDRIVE', color:'#ff8c42', fn:(src,m)=>{
    const w=AC.createWaveShaper();
    const n=256,cv=new Float32Array(n);
    for(let i=0;i<n;i++){const x=(i*2)/n-1;cv[i]=x<0?-Math.pow(-x,.5):Math.pow(x,.5);}
    w.curve=cv; const g=AC.createGain(); g.gain.value=0.5;
    src.connect(w); w.connect(g); g.connect(m);
  }},
  {name:'RING MOD',  color:'#ff9ee5', fn:(src,m)=>{
    const osc=AC.createOscillator(); osc.frequency.value=340;
    const mg=AC.createGain(); mg.gain.value=0;
    osc.connect(mg.gain); src.connect(mg); mg.connect(m); osc.start();
    src.onended=()=>{ try{osc.stop();}catch(e){} };
  }},
  {name:'STUTTER',   color:'#ffffff', fn:(src,m)=>{
    // Tremolo fast chop
    const lfo=AC.createOscillator(); lfo.frequency.value=14;
    const lfoG=AC.createGain(); lfoG.gain.value=0.5;
    const trG=AC.createGain(); trG.gain.value=0.5;
    lfo.connect(lfoG); lfoG.connect(trG.gain);
    src.connect(trG); trG.connect(m); lfo.start();
    src.onended=()=>{ try{lfo.stop();}catch(e){} };
  }},
];

// ── Scene state ─────────────────────────────────────
const LANES  = [0.22, 0.5, 0.78];
const COLORS = ['#00e5ff','#00ff88','#ff3cac'];

function rgba(hex,a){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}
function teardrop(ctx,x,y,r){
  ctx.beginPath();
  ctx.moveTo(x,y-r*1.45);
  ctx.bezierCurveTo(x+r*.95,y-r*.55,x+r,y+r*.42,x,y+r*1.05);
  ctx.bezierCurveTo(x-r,y+r*.42,x-r*.95,y-r*.55,x,y-r*1.45);
  ctx.closePath();
}

// ── Drip class ────────────────────────────────────────
class Drip {
  constructor(nIdx){
    this.nIdx    = nIdx;
    this.col     = COLORS[nIdx];
    this.fxCol   = COLORS[nIdx];
    this.activeFx= null;
    this.laneIdx = nIdx;
    this.x  = LANES[nIdx]*W;
    this.y  = 124;
    this.vx = 0;
    this.vy = 1.2 + Math.random()*0.9;
    this.r  = 9 + Math.random()*5;
    this.tail   = [];
    this.glowT  = 0;
    this.hitCD  = new WeakMap();
    this._src   = null;
    this._master= null;
    this._startLoop(null);
  }

  _startLoop(fxEntry){
    if(this._src){ try{this._src.stop();}catch(e){} this._src=null; }
    if(this._master){ try{this._master.disconnect();}catch(e){} this._master=null; }
    const snip = randSnippet();
    if(!AC||!snip) return;

    const master=AC.createGain();
    master.gain.value=0.82;
    master.connect(AC.destination);
    this._master=master;

    const src=AC.createBufferSource();
    src.buffer=snip;
    src.loop=true;

    if(fxEntry){ fxEntry.fn(src,master); }
    else { src.connect(master); }
    src.start();
    this._src=src;
  }

  applyFx(fxEntry){
    this.activeFx=fxEntry;
    this.fxCol=fxEntry.color;
    this.glowT=50;
    this._startLoop(fxEntry);
  }

  update(dt){
    this.vy+=0.055;
    this.x+=this.vx*dt*60;
    this.y+=this.vy*dt*60;
    const tx=LANES[this.laneIdx]*W;
    this.vx+=(tx-this.x)*0.004; this.vx*=0.96;
    this.tail.unshift({x:this.x,y:this.y,r:this.r});
    if(this.tail.length>28) this.tail.pop();
    if(this.glowT>0) this.glowT-=dt*60;
    for(const ramp of ramps){
      if(ramp.age<10) continue;
      const cd=this.hitCD.get(ramp)||0;
      if(performance.now()-cd<1500) continue;
      if(ramp.hits(this.x,this.y,this.r+9)){this.hitRamp(ramp);break;}
    }
    if(this.y>H+55) this.respawn();
  }

  hitRamp(ramp){
    this.hitCD.set(ramp,performance.now());
    const dir=ramp.dir==='right'?1:-1;
    this.vx=dir*(2.4+Math.random()*1.8);
    this.vy=Math.max(1.2,this.vy*0.5);
    this.laneIdx=Math.min(2,Math.max(0,this.laneIdx+dir));
    this.applyFx(ramp.fx);
    ramp.flash(); showFx(ramp.fx.name,ramp.fx.color);
  }

  respawn(){
    this.laneIdx=this.nIdx;
    this.x=LANES[this.nIdx]*W; this.y=124;
    this.vy=1.2+Math.random()*.9; this.vx=0;
    this.tail=[]; this.glowT=0;
    // grab a fresh random snippet on respawn
    this._startLoop(this.activeFx);
  }

  destroy(){
    if(this._src){ try{this._src.stop();}catch(e){} }
    if(this._master){ try{this._master.disconnect();}catch(e){} }
  }

  draw(){
    for(let i=0;i<this.tail.length;i++){
      const t=this.tail[i];
      ctx.beginPath();
      ctx.arc(t.x,t.y,Math.max(.5,t.r*(1-i/this.tail.length)*.75),0,Math.PI*2);
      ctx.fillStyle=rgba(this.fxCol,(1-i/this.tail.length)*.26);
      ctx.fill();
    }
    if(this.glowT>0){
      const a=Math.min(1,this.glowT/50);
      ctx.save(); ctx.shadowColor=this.fxCol; ctx.shadowBlur=36*a;
      ctx.beginPath(); ctx.arc(this.x,this.y,this.r+10,0,Math.PI*2);
      ctx.fillStyle=rgba(this.fxCol,.11*a); ctx.fill(); ctx.restore();
    }
    ctx.save(); ctx.translate(this.x,this.y);
    ctx.shadowColor=this.fxCol; ctx.shadowBlur=this.glowT>0?24:11;
    teardrop(ctx,0,0,this.r);
    const g=ctx.createRadialGradient(-this.r*.28,-this.r*.38,0,0,0,this.r*1.3);
    g.addColorStop(0,rgba(this.fxCol,1));
    g.addColorStop(.5,rgba(this.fxCol,.82));
    g.addColorStop(1,rgba(this.fxCol,.1));
    ctx.fillStyle=g; ctx.fill();
    ctx.beginPath(); ctx.arc(-this.r*.27,-this.r*.32,this.r*.21,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,.4)'; ctx.fill();
    ctx.restore();
  }
}

// ── Ramp class ────────────────────────────────────────
class Ramp{
  constructor(x,y){
    this.cx=x; this.cy=y;
    this.dir=x<W*.5?'right':'left';
    this.fx=FX_LIST[Math.floor(Math.random()*FX_LIST.length)];
    this.len=78+Math.random()*40;
    this.age=0; this.maxAge=900+Math.random()*700;
    this.flashT=0; this.opacity=0;
    const dx=this.dir==='right'?1:-1;
    this.x1=x-dx*this.len*.5; this.y1=y-this.len*.5;
    this.x2=x+dx*this.len*.5; this.y2=y+this.len*.5;
  }
  hits(px,py,m){
    const dx=this.x2-this.x1,dy=this.y2-this.y1,t2=dx*dx+dy*dy;
    if(!t2)return false;
    const t=Math.max(0,Math.min(1,((px-this.x1)*dx+(py-this.y1)*dy)/t2));
    const nx=this.x1+t*dx-px,ny=this.y1+t*dy-py;
    return Math.sqrt(nx*nx+ny*ny)<m;
  }
  flash(){ this.flashT=32; }
  update(dt){
    this.age+=dt*60; if(this.flashT>0) this.flashT-=dt*60;
    if(this.age<20) this.opacity=this.age/20;
    else if(this.age>this.maxAge-65) this.opacity=Math.max(0,(this.maxAge-this.age)/65);
    else this.opacity=1;
  }
  draw(){
    if(this.opacity<=0)return;
    const fl=this.flashT>0,col=fl?this.fx.color:'#ffd740';
    const mx=(this.x1+this.x2)*.5,my=(this.y1+this.y2)*.5;
    ctx.save(); ctx.globalAlpha=this.opacity;
    ctx.strokeStyle=col; ctx.lineWidth=fl?4.5:2.5; ctx.lineCap='round';
    ctx.shadowColor=col; ctx.shadowBlur=fl?30:10;
    ctx.beginPath(); ctx.moveTo(this.x1,this.y1); ctx.lineTo(this.x2,this.y2); ctx.stroke();
    ctx.font=`${fl?'bold ':''}${fl?11:9}px 'Space Mono',monospace`;
    ctx.fillStyle=col; ctx.textAlign='center'; ctx.shadowBlur=fl?16:4;
    ctx.fillText(this.fx.name,mx,my-13);
    ctx.fillText(this.dir==='right'?'→':'←',mx,my+2);
    ctx.restore();
  }
  dead(){ return this.age>=this.maxAge; }
}

// ── Main loop ─────────────────────────────────────────
let drips=[], ramps=[], appStarted=false, lastT=0;

let fxTimer=0;
function showFx(name,color){
  const el=document.getElementById('fx-banner');
  el.textContent='✦ '+name+' ✦'; el.style.color=color;
  el.style.textShadow=`0 0 20px ${color}`; el.style.opacity='1'; fxTimer=145;
}

function drawBg(){
  ctx.clearRect(0,0,W,H);
  const vg=ctx.createRadialGradient(W*.5,H*.5,H*.1,W*.5,H*.5,H*.95);
  vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(0,0,0,.6)');
  ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);
  ctx.setLineDash([5,22]);
  for(let i=0;i<3;i++){
    const x=LANES[i]*W;
    const lg=ctx.createLinearGradient(x,100,x,H);
    lg.addColorStop(0,'rgba(255,255,255,0)');
    lg.addColorStop(.45,'rgba(255,255,255,.07)');
    lg.addColorStop(1,'rgba(255,255,255,.02)');
    ctx.strokeStyle=lg; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(x,100); ctx.lineTo(x,H); ctx.stroke();
  }
  ctx.setLineDash([]);
  for(let i=0;i<3;i++){
    const x=LANES[i]*W,col=COLORS[i];
    const pg=ctx.createLinearGradient(x,88,x,132);
    pg.addColorStop(0,col); pg.addColorStop(1,'transparent');
    ctx.strokeStyle=pg; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.moveTo(x,88); ctx.lineTo(x,132); ctx.stroke();
  }
}

function loop(ts){
  requestAnimationFrame(loop);
  if(!appStarted)return;
  const dt=Math.min((ts-lastT)/1000,.05); lastT=ts;
  drawBg();
  for(let i=ramps.length-1;i>=0;i--){ ramps[i].update(dt); ramps[i].draw(); if(ramps[i].dead()) ramps.splice(i,1); }
  for(const d of drips){ d.update(dt); d.draw(); }
  if(fxTimer>0){ fxTimer--; if(fxTimer<40) document.getElementById('fx-banner').style.opacity=(fxTimer/40).toFixed(3); }
}
requestAnimationFrame(loop);

// ── Recording UI events ───────────────────────────────
const recBtn = document.getElementById('rec-btn');

recBtn.addEventListener('click', async e=>{
  e.preventDefault();
  e.stopPropagation();
  if(isRecording){ stopRecording(); }
  else { await startRecording(); }
});

document.getElementById('use-btn').addEventListener('pointerdown', e=>{
  e.preventDefault();
  if(!fullBuffer) return;
  // Transition to main app
  initAC();
  appStarted=true; lastT=performance.now();
  const ov=document.getElementById('rec-overlay');
  ov.style.transition='opacity .5s'; ov.style.opacity='0'; ov.style.pointerEvents='none';
  setTimeout(()=>ov.style.display='none',550);
});

document.getElementById('re-rec').addEventListener('pointerdown', e=>{
  e.preventDefault();
  fullBuffer=null; snippets=[];
  document.getElementById('use-btn').style.display='none';
  document.getElementById('re-rec').style.display='none';
  document.getElementById('rec-label').textContent='TAP TO RECORD';
  wfCtx.clearRect(0,0,wfCanvas.width,wfCanvas.height);
});

document.getElementById('new-rec-btn').addEventListener('pointerdown', e=>{
  e.stopPropagation();
  // Kill all drips cleanly
  for(const d of drips) d.destroy();
  drips=[]; ramps=[];
  appStarted=false;
  fullBuffer=null; snippets=[];
  const ov=document.getElementById('rec-overlay');
  ov.style.display='flex'; ov.style.opacity='0';
  requestAnimationFrame(()=>{ ov.style.transition='opacity .4s'; ov.style.opacity='1'; ov.style.pointerEvents='all'; });
  document.getElementById('use-btn').style.display='none';
  document.getElementById('re-rec').style.display='none';
  document.getElementById('rec-label').textContent='TAP TO RECORD';
  wfCtx.clearRect(0,0,wfCanvas.width,wfCanvas.height);
});

// ── Spawn drips ───────────────────────────────────────
function spawn(nIdx){
  if(!appStarted||!snippets.length) return;
  if(drips.filter(d=>d.nIdx===nIdx).length>=5) return;
  drips.push(new Drip(nIdx));
}
document.getElementById('b1').addEventListener('pointerdown',e=>{e.stopPropagation();spawn(0);});
document.getElementById('b2').addEventListener('pointerdown',e=>{e.stopPropagation();spawn(1);});
document.getElementById('b3').addEventListener('pointerdown',e=>{e.stopPropagation();spawn(2);});

// ── Place ramps ───────────────────────────────────────
canvas.addEventListener('pointerdown',e=>{
  if(!appStarted)return;
  if(ramps.length>16) ramps.shift();
  ramps.push(new Ramp(e.clientX,e.clientY));
});
</script>
